name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  UV_NO_SOURCES: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install "kombu-asyncio @ git+https://github.com/oliverhaas/kombu-asyncio.git@main"

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format check
        run: uv run ruff format --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install "kombu-asyncio @ git+https://github.com/oliverhaas/kombu-asyncio.git@main"

      - name: Run tests
        run: uv run pytest -p no:xdist

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
