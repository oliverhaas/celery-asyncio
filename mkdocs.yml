site_name: celery-asyncio
site_description: Distributed task queue with native asyncio support
site_url: https://oliverhaas.github.io/celery-asyncio/
repo_url: https://github.com/oliverhaas/celery-asyncio
repo_name: oliverhaas/celery-asyncio
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            docstring_style: sphinx

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Migration Guide: getting-started/migration.md
  - User Guide:
      - Architecture: user-guide/architecture.md
      - Async Tasks: user-guide/async-tasks.md
      - Configuration: user-guide/configuration.md
      - Django Integration: user-guide/django.md
  - API Reference:
      - Application: reference/app.md
      - Task: reference/task.md
      - Canvas: reference/canvas.md
      - Results: reference/result.md
      - Signals: reference/signals.md
      - Schedules: reference/schedules.md
      - States: reference/states.md
  - Changelog: reference/changelog.md
